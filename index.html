<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palindrome Checker</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow:hidden;
      font-family:Arial,sans-serif;
      background:
      radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
      radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
      linear-gradient(135deg,#020617,#0f172a,#111827);
      position:relative;
    }

    /* BACKGROUND GLOW */

    body::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:#38bdf8;
      filter:blur(140px);
      opacity:0.15;
      top:-150px;
      left:-150px;
      animation:moveGlow 8s infinite alternate;
    }

    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      background:#2563eb;
      filter:blur(120px);
      opacity:0.18;
      bottom:-120px;
      right:-120px;
      animation:moveGlow2 10s infinite alternate;
    }

    .container{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.12);
      padding:45px 35px;
      border-radius:32px;
      text-align:center;
      box-shadow:
      0 25px 70px rgba(0,0,0,0.45),
      inset 0 0 20px rgba(255,255,255,0.05);
      animation:pop 1s ease;
      position:relative;
      z-index:2;
    }

    h1{
      font-size:46px;
      line-height:1.2;
      margin-bottom:30px;
      color:white;
      font-weight:800;
      letter-spacing:-1px;
      animation:float 4s ease-in-out infinite;
      text-shadow:0 10px 30px rgba(56,189,248,0.35);
    }

    .highlight{
      color:#38bdf8;
    }

    input{
      width:100%;
      padding:18px 20px;
      border:none;
      outline:none;
      border-radius:18px;
      font-size:17px;
      color:white;
      background:rgba(255,255,255,0.08);
      border:2px solid rgba(56,189,248,0.3);
      transition:0.35s ease;
      backdrop-filter:blur(10px);
    }

    input::placeholder{
      color:rgba(255,255,255,0.6);
    }

    input:focus{
      border-color:#38bdf8;
      box-shadow:
      0 0 25px rgba(56,189,248,0.45),
      0 0 60px rgba(56,189,248,0.18);
      transform:scale(1.02);
    }

    button{
      margin-top:22px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#38bdf8,#2563eb);
      color:white;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:0.35s ease;
      position:relative;
      overflow:hidden;
      letter-spacing:1px;
    }

    button::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.25);
      transform:skewX(30deg);
      transition:0.7s;
    }

    button:hover::before{
      left:130%;
    }

    button:hover{
      transform:translateY(-5px) scale(1.02);
      box-shadow:
      0 18px 40px rgba(37,99,235,0.45),
      0 0 35px rgba(56,189,248,0.25);
    }

    button:active{
      transform:scale(0.96);
    }

    /* CUSTOM ALERT */

    #customAlert{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) scale(0);
      width:90%;
      max-width:340px;
      background:rgba(15,23,42,0.95);
      backdrop-filter:blur(18px);
      color:white;
      padding:30px 25px;
      border-radius:24px;
      text-align:center;
      box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      0 0 40px rgba(56,189,248,0.18);
      transition:0.4s ease;
      z-index:100;
      border:1px solid rgba(255,255,255,0.08);
    }

    #customAlert.show{
      transform:translate(-50%,-50%) scale(1);
    }

    #alertText{
      font-size:22px;
      line-height:1.5;
      margin-bottom:20px;
      letter-spacing:2px;
      font-weight:700;
    }

    #customAlert button{
      margin-top:0;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    /* ANIMATIONS */

    @keyframes float{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes pop{

      from{
        opacity:0;
        transform:scale(0.7);
      }

      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @keyframes moveGlow{

      from{
        transform:translate(0,0);
      }

      to{
        transform:translate(80px,60px);
      }
    }

    @keyframes moveGlow2{

      from{
        transform:translate(0,0);
      }

      to{
        transform:translate(-70px,-40px);
      }
    }

    /* TABLET */

    @media (max-width:768px){

      .container{
        padding:40px 28px;
      }

      h1{
        font-size:38px;
      }
    }

    /* MOBILE */

    @media (max-width:480px){

      body{
        padding:16px;
      }

      .container{
        padding:32px 22px;
        border-radius:26px;
      }

      h1{
        font-size:30px;
        margin-bottom:22px;
      }

      input{
        padding:16px;
        font-size:15px;
        border-radius:15px;
      }

      button{
        padding:15px;
        font-size:16px;
        border-radius:15px;
      }

      #alertText{
        font-size:18px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>
      <span class="highlight">Palindrome</span><br>
      Checker
    </h1>

    <input
      id="input"
      type="text"
      placeholder="Enter a word..."
    >

    <button onclick="check()">
      CHECK NOW
    </button>

  </div>

  <!-- CUSTOM ALERT -->

  <div id="customAlert">

    <p id="alertText"></p>

    <button onclick="closeAlert()">
      OK
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>

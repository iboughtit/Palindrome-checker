<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palindrome Checker</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#89f7fe,#66a6ff);
      font-family:Arial,sans-serif;
      overflow:hidden;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:25px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
      text-align:center;
      animation:pop 1s ease;
    }

    h1{
      font-size:42px;
      margin-bottom:25px;
      color:#111827;
      font-family:cursive;
      animation:float 3s ease-in-out infinite;
    }

    input{
      width:300px;
      padding:15px;
      border:none;
      outline:none;
      border-radius:14px;
      font-size:17px;
      border:2px solid #38bdf8;
      transition:0.3s ease;
    }

    input:focus{
      transform:scale(1.05);
      box-shadow:0 0 20px #38bdf8;
    }

    button{
      margin-top:20px;
      padding:14px 35px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#38bdf8,#2563eb);
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.3);
      transform:skewX(30deg);
      transition:0.6s;
    }

    button:hover::before{
      left:120%;
    }

    button:hover{
      transform:translateY(-6px) scale(1.05);
      box-shadow:0 15px 30px rgba(37,99,235,0.4);
    }

    button:active{
      transform:scale(0.95);
    }

    /* CUSTOM ALERT */

    #customAlert{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) scale(0);
      background:#111827;
      color:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 25px 60px rgba(0,0,0,0.4);
      width:320px;
      transition:0.4s ease;
      z-index:100;
    }

    #customAlert.show{
      transform:translate(-50%,-50%) scale(1);
    }

    #alertText{
      font-size:20px;
      margin-bottom:20px;
      letter-spacing:3px;
    }

    #customAlert button{
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    /* ANIMATIONS */

    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes pop{
      from{
        opacity:0;
        transform:scale(0.7);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Palindrome Checker</h1>

    <input 
      id="input"
      type="text"
      placeholder="Enter a string"
    >

    <br>

    <button onclick="check()">
      Check
    </button>

  </div>

  <!-- CUSTOM ALERT -->

  <div id="customAlert">
    <p id="alertText"></p>

    <button onclick="closeAlert()">
      OK
    </button>
  </div>

   <script src="script.js"></script>

</body>
</html>
